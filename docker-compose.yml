services:

  postgres:
    image: postgres:16-alpine
    container_name: interview-postgres

    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U interview_user -d interview_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: interview-backend

    depends_on:
      postgres:
        condition: service_healthy

    env_file:
      - .env

    ports:
      - "8080:8080"

    restart: unless-stopped

volumes:
  postgres_data:
